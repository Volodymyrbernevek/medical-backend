[tool.ruff]
# Вказуємо версію Python, під яку пишемо код
target-version = "py310"

# Максимально дозволена довжина одного рядка коду (88 — стандарт для Black/Ruff)
line-length = 88

# Папки, які лінтер має повністю ігнорувати
exclude = [
    ".git",
    "venv",
    "__pycache__"
]

[tool.ruff.lint]
# Які групи правил увімкнути:
# E, W — помилки та попередження стилю (PEP 8)
# F — критичні баги Python (Flake8)
# I — правильне сортування імпортів (isort)
# B — захист від очевидних логічних помилок (flake8-bugbear)
select = ["E", "W", "F", "I", "B"]

# Сюди можна вписувати специфічні коди помилок, які ти хочеш ігнорувати
ignore = ["B008"]

[tool.ruff.lint.isort]
# Робить так, щоб групові імпорти красиво об'єднувалися в один рядок
combine-as-imports = true